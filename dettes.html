<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BANKVI — Dettes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">BANK<span>VI</span></div>
    <div class="nav-date" id="nav-date"></div>
    <div class="nav-avatar" id="nav-avatar">?</div>
  </nav>

  <main class="main-content">
    <section class="hero-card">
      <div class="hero-left">
        <p class="hero-label">Total dettes en cours</p>
        <h1 class="hero-amount" id="hero-amount">0 F</h1>
        <p class="hero-sub" id="hero-sub">0 clients concernés</p>
      </div>
      <div class="hero-badge">En cours</div>
      <div class="hero-stats">
        <div class="hero-stat"><span class="hs-label">En retard</span><span class="hs-val warn" id="stat-retard">0 F</span></div>
        <div class="hero-stat"><span class="hs-label">Cette semaine</span><span class="hs-val" id="stat-semaine">0 F</span></div>
        <div class="hero-stat"><span class="hs-label">Remboursé</span><span class="hs-val green" id="stat-rembourse">0 F</span></div>
      </div>
    </section>

    <button class="btn-primary" onclick="document.getElementById('modal-dette').classList.add('open')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
      Ajouter une dette
    </button>

    <div class="search-bar" style="margin-bottom:1.25rem;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4" stroke="#a0a0a0" stroke-width="1.5"/>
        <path d="M9.5 9.5L12 12" stroke="#a0a0a0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-dettes" placeholder="Rechercher un client ou produit...">
    </div>

    <div class="filters-row">
      <button class="filter-btn active" onclick="filtrerDettes('toutes', this)">Toutes</button>
      <button class="filter-btn" onclick="filtrerDettes('en_cours', this)">En cours</button>
      <button class="filter-btn" onclick="filtrerDettes('payee', this)">Payées</button>
    </div>

    <div class="cards-list" id="liste-dettes">
      <div style="padding:1.5rem;text-align:center;color:#a0a0a0;font-size:14px;">Chargement...</div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>Accueil</a>
    <a href="dettes.html" class="bn-item active"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M9 6v3l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Dettes</a>
    <a href="ventes.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M3 12l3-3 3 3 3-4 3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Ventes</a>
    <a href="stocks.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect x="3" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 9h6M9 6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Stocks</a>
    <a href="profil.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Profil</a>
  </nav>

  <div class="modal-bg" id="modal-dette">
    <div class="modal">
      <h3 class="modal-title">Nouvelle dette</h3>
      <div class="field"><label>Nom du client</label><input type="text" id="dette-client" placeholder="Ex: Kofi Mensah"></div>
      <div class="field"><label>Produit acheté</label><input type="text" id="dette-produit" placeholder="Ex: Riz 50kg x2"></div>
      <div class="field"><label>Montant (FCFA)</label><input type="number" id="dette-montant" placeholder="Ex: 25000"></div>
      <div class="field"><label>Date de remboursement</label><input type="date" id="dette-date"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-dette').classList.remove('open')">Annuler</button>
        <button class="btn-save" id="btn-save-dette">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modal-modifier-dette">
    <div class="modal">
      <h3 class="modal-title">Modifier la dette</h3>
      <input type="hidden" id="modifier-dette-id">
      <div class="field"><label>Nom du client</label><input type="text" id="modifier-dette-client"></div>
      <div class="field"><label>Produit</label><input type="text" id="modifier-dette-produit"></div>
      <div class="field"><label>Montant (FCFA)</label><input type="number" id="modifier-dette-montant"></div>
      <div class="field"><label>Date remboursement</label><input type="date" id="modifier-dette-date"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-modifier-dette').classList.remove('open')">Annuler</button>
        <button class="btn-save" id="btn-save-modifier-dette">Modifier</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dettes.js"></script>
</body>
</html>
