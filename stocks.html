<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BANKVI — Stocks</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">BANK<span>VI</span></div>
    <div class="nav-date" id="nav-date"></div>
    <div class="nav-avatar" id="nav-avatar">?</div>
  </nav>

  <main class="main-content">
    <div class="metrics-grid" style="margin-bottom:1.25rem;">
      <div class="metric-card"><p class="metric-label">Produits</p><h2 class="metric-value green" id="m-total">0</h2><p class="metric-sub">en stock</p></div>
      <div class="metric-card"><p class="metric-label">Stock bas</p><h2 class="metric-value warn" id="m-bas">0</h2><p class="metric-sub">à renouveler</p></div>
      <div class="metric-card"><p class="metric-label">Rupture</p><h2 class="metric-value red" id="m-rupture">0</h2><p class="metric-sub">urgents</p></div>
    </div>

    <button class="btn-primary" onclick="document.getElementById('modal-stock').classList.add('open')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
      Ajouter un produit
    </button>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#a0a0a0" stroke-width="1.5"/><path d="M9.5 9.5L12 12" stroke="#a0a0a0" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un produit...">
    </div>

    <div class="cards-list" id="liste-stocks">
      <div style="padding:1.5rem;text-align:center;color:#a0a0a0;font-size:14px;">Chargement...</div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>Accueil</a>
    <a href="dettes.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M9 6v3l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Dettes</a>
    <a href="ventes.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M3 12l3-3 3 3 3-4 3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Ventes</a>
    <a href="stocks.html" class="bn-item active"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect x="3" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 9h6M9 6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Stocks</a>
    <a href="profil.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Profil</a>
  </nav>

  <div class="modal-bg" id="modal-stock">
    <div class="modal">
      <h3 class="modal-title">Nouveau produit</h3>
      <div class="field"><label>Nom du produit</label><input type="text" id="stock-nom" placeholder="Ex: Riz importé 50kg"></div>
      <div class="field">
        <label>Catégorie</label>
        <select id="stock-categorie">
          <option>Alimentation</option>
          <option>Hygiène</option>
          <option>Boissons</option>
          <option>Textile</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field"><label>Quantité</label><input type="number" id="stock-quantite" placeholder="Ex: 30"></div>
        <div class="field"><label>Seuil d'alerte</label><input type="number" id="stock-seuil" placeholder="Ex: 5"></div>
      </div>
      <div class="field"><label>Prix unitaire (FCFA)</label><input type="number" id="stock-prix" placeholder="Ex: 11000"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-stock').classList.remove('open')">Annuler</button>
        <button class="btn-save" id="btn-save-stock">Enregistrer</button>
      </div>
    </div>
  </div>
<div class="modal-bg" id="modal-modifier-stock">
  <div class="modal">
    <h3 class="modal-title">Modifier le produit</h3>
    <input type="hidden" id="modifier-stock-id">
    <div class="field"><label>Nom du produit</label><input type="text" id="modifier-stock-nom"></div>
    <div class="field">
      <label>Catégorie</label>
      <select id="modifier-stock-categorie">
        <option>Alimentation</option>
        <option>Hygiène</option>
        <option>Boissons</option>
        <option>Textile</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field"><label>Quantité</label><input type="number" id="modifier-stock-quantite"></div>
      <div class="field"><label>Seuil alerte</label><input type="number" id="modifier-stock-seuil"></div>
    </div>
    <div class="field"><label>Prix unitaire (FCFA)</label><input type="number" id="modifier-stock-prix"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('modal-modifier-stock').classList.remove('open')">Annuler</button>
      <button class="btn-save" id="btn-save-modifier-stock">Modifier</button>
    </div>
  </div>
</div>
  <script src="js/app.js"></script>
  <script src="js/stocks.js"></script>
</body>
</html>
